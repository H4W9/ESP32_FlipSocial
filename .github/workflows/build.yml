name: Build Firmware

on:
  push:
    branches: [main, master]
    tags: ['v*']            # a v* tag push also cuts a release
  pull_request:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create/refresh a GitHub release with the artifacts'
        type: boolean
        default: false

permissions:
  contents: write           # needed by the (optional) release step

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Pancake (ESP32-C5, 8 MB flash, PSRAM) ────────────────────────────
          - board:     MARAUDER_PANCAKE
            short:     pancake
            fqbn:      "esp32:esp32:esp32c5:CDCOnBoot=default,CPUFreq=240,FlashFreq=80,FlashMode=qio,FlashSize=8M,PSRAM=enabled,PartitionScheme=custom,UploadSpeed=921600"
            tft_setup: User_Setup_marauder_pancake
            max_size:  3604480    # ota_0 slot size (0x370000)

          # ── V8 (ESP32-C5, ILI9341 240x320, resistive) — enable once the V8
          #     board port lands. Uncomment to add it to the build matrix.
          # - board:     MARAUDER_V8
          #   short:     v8
          #   fqbn:      "esp32:esp32:esp32c5:CDCOnBoot=default,CPUFreq=240,FlashFreq=80,FlashMode=qio,FlashSize=8M,PSRAM=enabled,PartitionScheme=custom,UploadSpeed=921600"
          #   tft_setup: User_Setup_marauder_v8
          #   max_size:  3604480

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache ESP32 Arduino core
        uses: actions/cache@v4
        id: esp32-core-cache
        with:
          path: ~/.arduino15
          key: esp32-core-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install ESP32 Arduino core
        if: steps.esp32-core-cache.outputs.cache-hit != 'true'
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Restore arduino-cli config (cache hit path)
        if: steps.esp32-core-cache.outputs.cache-hit == 'true'
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      # Sketch libraries (installed into the sketchbook — found automatically).
      - name: Install libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "ArduinoHttpClient"

      # Patched TFT_eSPI for the ESP32-C5 (same fork the Marauder build uses).
      - name: Install TFT_eSPI (ESP32-C5 fork)
        uses: actions/checkout@v4
        with:
          repository: H4W9/TFT_eSPI
          ref: ESP32-C5
          path: TFT_eSPI-ESP32-C5

      # The TFT fork ships the driver, not the board User_Setup files. Copy the
      # ones bundled in this repo into the library and point Select.h at ours.
      - name: Select TFT User_Setup for ${{ matrix.board }}
        run: |
          cp User_Setup_*.h TFT_eSPI-ESP32-C5/
          echo "#include <${{ matrix.tft_setup }}.h>" > TFT_eSPI-ESP32-C5/User_Setup_Select.h
          ls TFT_eSPI-ESP32-C5/User_Setup_*.h
          cat TFT_eSPI-ESP32-C5/User_Setup_Select.h

      # Arduino IDE can't inject git data — stamp the short SHA into FW_COMMIT.
      - name: Stamp commit SHA
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          SHORT=${GIT_SHA:0:7}
          sed -i -E "s/#define FW_COMMIT[[:space:]]+\"[^\"]*\"/#define FW_COMMIT  \"$SHORT\"/" configs.h
          grep FW_COMMIT configs.h

      - name: Compile ${{ matrix.board }}
        run: |
          arduino-cli compile \
            --fqbn "${{ matrix.fqbn }}" \
            --library "TFT_eSPI-ESP32-C5" \
            --build-property "compiler.cpp.extra_flags=-D${{ matrix.board }}" \
            --build-property "upload.maximum_size=${{ matrix.max_size }}" \
            --output-dir "dist/${{ matrix.short }}" \
            --warnings default \
            .

      # Rename to match the release template:
      #   ESP32_FlipSocial_v<ver>_<board>.bin  (+ bootloader / partitions / merged)
      - name: Rename binaries
        id: bins
        run: |
          VER=$(grep -oP '#define\s+FW_VERSION\s+"\K[^"]+' configs.h)
          VER_U=${VER//./_}
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          mkdir -p out
          D="dist/${{ matrix.short }}"
          # App bin carries the board name (matches the v1.0.0 release template).
          cp "$D/ESP32_FlipSocial.ino.bin" "out/ESP32_FlipSocial_v${VER_U}_${{ matrix.short }}.bin"
          # Shared bins (single-board build) match the template names verbatim.
          [ -f "$D/ESP32_FlipSocial.ino.bootloader.bin" ] && cp "$D/ESP32_FlipSocial.ino.bootloader.bin" "out/ESP32_FlipSocial_bootloader.bin" || true
          [ -f "$D/ESP32_FlipSocial.ino.partitions.bin" ] && cp "$D/ESP32_FlipSocial.ino.partitions.bin" "out/ESP32_FlipSocial_partitions.bin" || true
          [ -f "$D/ESP32_FlipSocial.ino.merged.bin" ]     && cp "$D/ESP32_FlipSocial.ino.merged.bin"     "out/ESP32_FlipSocial_merged.bin"     || true
          ls -l out

      - name: Upload ${{ matrix.short }} binaries
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.short }}
          path: out/*
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Optional release — on a v* tag push, or a manual run with release=true.
  # Tag / title / bin names follow the initial v1.0.0 release for consistency.
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          VER=$(grep -oP '#define\s+FW_VERSION\s+"\K[^"]+' configs.h)
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: dl
          merge-multiple: true

      - name: Create / refresh release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.meta.outputs.version }}"
          gh release delete "$TAG" --yes || true
          gh release create "$TAG" dl/*.bin \
            --title "$TAG" \
            --notes "Automated build of FlipSocial $TAG." \
            --target "${{ github.sha }}"
